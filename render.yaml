services:
  - type: web
    name: backend-tickets
    env: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: reclamations-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: votre-app.onrender.com,localhost
      - key: CORS_ALLOWED_ORIGINS
        value: https://votre-frontend.onrender.com,http://localhost:8080

databases:
  - name: reclamations-db
    plan: free